# ResearchFlow - Stack de produccion en droplet DigitalOcean
# Servicios: Caddy (HTTPS automatico) + n8n + Postgres + Redis + Evolution API
# Uso: copiar esta carpeta al droplet, completar .env (ver .env.example) y ejecutar:
#   docker compose up -d

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n
      - evolution
      - simulador

  simulador:
    image: python:3.12
    restart: unless-stopped
    volumes:
      - ../simulador_whatsapp.py:/app/simulador_whatsapp.py:ro
    working_dir: /app
    command: python3 simulador_whatsapp.py
    expose:
      - "8777"
    ports:
      - "8777:8777"   # acceso directo por IP (http://IP:8777) ademas del dominio

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n.${DOMAIN}
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://n8n.${DOMAIN}/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - GENERIC_TIMEZONE=${TZ}
      - TZ=${TZ}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_PROXY_HOPS=1
      # Permitir que los workflows lean variables de entorno via {{ $env.X }}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Config de ResearchFlow inyectada a los workflows (evita placeholders inline)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
      - OWNER_NAME=${OWNER_NAME}
      - OWNER_EMAIL=${OWNER_EMAIL}
      - OWNER_WHATSAPP=${OWNER_WHATSAPP}
      # URL publica del webhook del flujo de investigacion (usada por el flujo de WhatsApp)
      - RESEARCH_WEBHOOK_URL=https://n8n.${DOMAIN}/webhook/researchflow
      # Permite que las expresiones lean $env (usado por el workflow de ideas para auto-llamarse).
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Base del webhook que usa "Ideas por WhatsApp" para lanzar la investigacion.
      # Dentro del mismo contenedor localhost:5678 sirve; en produccion detras de Caddy
      # puedes ponerlo en https://n8n.${DOMAIN} sin tocar el workflow.
      - RF_WEBHOOK_BASE=${RF_WEBHOOK_BASE:-http://localhost:5678}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  evolution:
    image: evoapicloud/evolution-api:v2.2.3
    restart: unless-stopped
    environment:
      - SERVER_URL=https://evo.${DOMAIN}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evolution?schema=public
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CONFIG_SESSION_PHONE_CLIENT=ResearchFlow
      # Version de WhatsApp Web vigente (evita "Timed Out" de Baileys al generar el QR).
      # Si vuelve a fallar el QR en el futuro, actualizar a la version actual de WA Web.
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1042918102
      - LOG_LEVEL=ERROR
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  n8n_data:
  evolution_instances:
